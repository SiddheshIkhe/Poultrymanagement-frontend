<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Stock Record</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 120px;
            position: relative;
        }

        /* Top red curved background */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #ff4d4d, #c62828);
            border-bottom-left-radius: 60% 100%;
            border-bottom-right-radius: 60% 100%;
            z-index: -1;
        }

        /* Header */
        header {
            position: absolute;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        header h2 {
            color: #fff;
            font-size: 28px;
            letter-spacing: 1px;
        }

        /* Home Button */
        .homeBotton {
            position: absolute;
            top: 30px;
            left: 30px;
        }

        .homeBotton a {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 20px;
            background: #fff;
            color: #e53935;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .homeBotton a:hover {
            background: #e53935;
            color: #fff;
        }

        /* Card */
        .chickenoutput {
            width: 500px;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }

        /* Input section */
        .output {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Labels */
        label {
            font-size: 14px;
            color: #444;
            font-weight: 600;
        }

        label::before {
            content: "";
            width: 6px;
            height: 6px;
            background: #e53935;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #fafafa;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #e53935;
            box-shadow: 0 0 6px rgba(229,57,53,0.3);
            background: #fff;
        }

        /* Button */
        .button {
            margin-top: 10px;
        }

        .button button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff4d4d, #e53935);
            color: #fff;
            cursor: pointer;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(229,57,53,0.4);
            transition: 0.3s;
        }

        .button button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #e53935, #b71c1c);
        }

        /* Table Card */
        .chickentable {
            width: 80%;
            max-width: 900px;
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            overflow-x: auto;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        table thead {
            background: linear-gradient(135deg, #ff4d4d, #e53935);
            color: #fff;
        }

        table th {
            padding: 14px;
            font-weight: 600;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        table tbody tr:nth-child(even) {
            background: #fafafa;
        }

        table tbody tr:hover {
            background: #ffe5e5;
        }

        table:empty::after {
            content: "No chicken stock records found";
            display: block;
            padding: 20px;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .chickenoutput {
                width: 90%;
            }

            .chickentable {
                width: 95%;
            }
        }
    </style>
</head>

<body>

    <header>
        <h2>Chicken Stock Records - Date Wise</h2>
    </header>

    <section class="homeBotton">
        <a href="dashboard.html">home</a>
    </section>

    <section class="chickenoutput">
        <div class="output">

            <label>Start Date</label>
            <input type="date" id="from">

            <label>End Date</label>
            <input type="date" id="to">

            <div class="button">
                <button id="getChickenBtn">Fetch</button>
            </div>

        </div>
    </section>

    <section class="chickentable">
        <table id="chickenTable"></table>
    </section>

    <script src="chicken.js"></script>

</body>
</html>
