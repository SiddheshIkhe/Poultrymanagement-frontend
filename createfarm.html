<!DOCTYPE html>
<html>

<head>
    <title>Create farm</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(to right, #fdf2f2, #f8eaea);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Header */
header {
    position: absolute;
    top: 70px;
    text-align: center;
}

header h2 {
    color: #c62828;
    font-size: 50px;
    letter-spacing: 1px;
}

/* Main Layout */
main {
    display: flex;
    justify-content: center;
}

/* Create Farm Card */
.createfarm {
    width: 350px;
    background: #f7f7f7;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* Title inside card */
.createfarm::before {
    content: "Create your Farm";
    display: block;
    font-size: 25px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #444;
}

/* Inputs */
input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 12px;
    border: 1px solid #ddd;
    font-size: 14px;
    outline: none;
    background: white;
    transition: 0.3s;
}

input:focus {
    border-color: #e53935;
    box-shadow: 0 0 6px rgba(229,57,53,0.3);
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(135deg, #ff4d4d, #e53935);
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(229,57,53,0.3);
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    background: linear-gradient(135deg, #e53935, #c62828);
}
    </style>
</head>

<body>
    <header>
        <h2>Create Farm</h2>
    </header>
    <main>
        <div class="createfarm">
            
            <input id="farmName" placeholder="Farm Name">
            <input id="location" placeholder="Location">
            <input id="capacity" placeholder="Capacity">
            <button id="createFarmBtn">Create Farm</button>
        </div>
    </main>
    <script src="farm.js"></script>
</body>

</html>
