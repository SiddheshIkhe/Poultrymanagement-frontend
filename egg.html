<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Production</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            height: 100vh;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Top curved red background */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #ff4d4d, #c62828);
            border-bottom-left-radius: 60% 100%;
            border-bottom-right-radius: 60% 100%;
            z-index: -1;
        }

        /* Header */
        header {
            position: absolute;
            top: 40px;
        }

        header h2 {
            color: #fff;
            font-size: 26px;
            letter-spacing: 1px;
        }

        /* Main */
        main {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* Card */
        .egginput {
            width: 500px;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Card Title */
        .egginput::before {
            content: "Add Production";
            text-align: center;
            font-size: 26px;
            font-weight: 600;
            color: #444;
            margin-bottom: 10px;
        }

        /* Labels */
        label {
            font-size: 14px;
            color: #444;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Red dot before label */
        label::before {
            content: "";
            width: 6px;
            height: 6px;
            background: #e53935;
            border-radius: 50%;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 15px;
            outline: none;
            background: #fafafa;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        input:focus {
            border-color: #e53935;
            box-shadow: 0 0 8px rgba(229, 57, 53, 0.3);
            background: #fff;
        }

        /* Button */
        button {
            margin-top: 15px;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #ff4d4d, #e53935);
            color: white;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(229, 57, 53, 0.4);
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #e53935, #b71c1c);
        }

        /* Back button */
        .back {
            position: absolute;
            top: 30px;
            left: 30px;
        }

        .back a {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 20px;
            background: white;
            color: #e53935;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .back a:hover {
            background: #e53935;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <h2>Egg Production</h2>
    </header>
    <main>
        <div class="back">
            <a href="dashboard.html">home</a>
        </div>
        <div class="egginput">

            <label>Date</label>
            <input type="date" id="eDate">
            <label>Number of Trays</label>
            <input placeholder="Trays" id="trays">

            <button id="addEggBtn">Add</button>
            <div>
        <a href="eggfetch.html">See Egg Records </a>

        </div>
        </div>
       

    </main>
    <script src="egg.js"></script>
</body>

</html>
