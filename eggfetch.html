<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Record</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 120px;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #ff4d4d, #c62828);
            border-bottom-left-radius: 60% 100%;
            border-bottom-right-radius: 60% 100%;
            z-index: -1;
        }

        h2 {
            position: absolute;
            top: 40px;
            color: white;
            font-size: 28px;
        }

        .homeBotton {
            position: absolute;
            top: 30px;
            left: 30px;
        }

        .homeBotton a {
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 20px;
            background: white;
            color: #e53935;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .homeBotton a:hover {
            background: #e53935;
            color: white;
        }

        /* Card */
        .eggoutput {
            width: 500px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column; /* ✅ vertical layout */
            gap: 15px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #444;
        }

        label::before {
            content: "";
            width: 6px;
            height: 6px;
            background: #e53935;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #fafafa;
            outline: none;
        }

        input:focus {
            border-color: #e53935;
            box-shadow: 0 0 6px rgba(229, 57, 53, 0.3);
            background: white;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff4d4d, #e53935);
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .eggtable {
            width: 80%;
            max-width: 900px;
            background: white;
            padding: 25px;
            border-radius: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        table thead {
            background: linear-gradient(135deg, #ff4d4d, #e53935);
            color: white;
        }

        table th, table td {
            padding: 12px;
        }

        table:empty::after {
            content: "No records found";
            display: block;
            padding: 20px;
            color: #888;
        }

        @media (max-width: 600px) {
            .eggoutput {
                width: 90%;
            }

            .eggtable {
                width: 95%;
            }
        }
    </style>
</head>

<body>

    <h2>Egg Records - Date Wise</h2>

    <section class="homeBotton">
        <a href="dashboard.html">home</a>
    </section>

    <div class="eggoutput">

        <div class="input-group">
            <label>Start Date</label>
            <input type="date" id="eFrom">
        </div>

        <div class="input-group">
            <label>End Date</label>
            <input type="date" id="eTo">
        </div>

        <button id="getEggBtn">Fetch</button>

    </div>

    <div class="eggtable">
        <table id="eggTable"></table>
    </div>

    <script src="egg.js"></script>

</body>

</html>
