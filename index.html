<!DOCTYPE html>
<html>

<head>
    <title>Poultry System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(to right, #fdf2f2, #f8eaea);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Header */
        header {
            position: absolute;
            top: 30px;
            text-align: center;
        }

        header h1 {
            color: #c62828;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Main Layout */
        main {
            display: flex;
            gap: 40px;
        }

        /* Left Card (Login) */
        .logininput {
            width: 350px;
            background: #f7f7f7;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .logininput::before {
            content: "Login to your account";
            display: block;
            font-size: 25px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #444;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
            background: white;
            transition: 0.3s;
        }

        input:focus {
            border-color: #e53935;
            box-shadow: 0 0 6px rgba(229,57,53,0.3);
        }

        /* Button */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff4d4d, #e53935);
            color: white;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(229,57,53,0.3);
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #e53935, #c62828);
        }

        /* Right Card (Create Account) */
        .createfarm {
            width: 350px;
            background: #f7f7f7;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .createfarm::before {
            content: "Create a new Farm";
            font-size: 25px;
            font-weight: 600;
            margin-bottom: 50px;
            color: #444;
        }

        .createfarm::after {
            content: "Create new farm now to manage your poultry farm efficiently.";
            font-size: 14px;
            color: #777;
            margin-bottom: 20px;
            margin-top: 30px;
        }

        .createfarm a {
            text-align: center;
            text-decoration: none;
            padding: 12px;
            border-radius: 25px;
            background: linear-gradient(135deg, #ff4d4d, #e53935);
            color: white;
            font-weight: 500;
            box-shadow: 0 6px 15px rgba(229,57,53,0.3);
        }

        .createfarm a:hover {
            background: linear-gradient(135deg, #e53935, #c62828);
        }

    </style>

</head>

<body>

    <header>
        <h1>Poultry Management</h1>
    </header>

    <main>

        <!-- Login Card -->
        <div class="logininput">
            <input id="username" placeholder="Username">
            <input id="password" type="password" placeholder="Password">

            <button onclick="login()">Login</button>
        </div>

        <!-- Create Account Card -->
        <div class="createfarm">
            <a href="createfarm.html">Create New Farm</a>
        </div>

    </main>
    <script src="api.js"></script>

    <script src="auth.js"></script>
</body>

</html>
